name: hospital-triage-env
version: 1.0

environment:
  entry_point: env.hospital_env:HospitalEnv

observation_space:
  type: dict
  fields:
    symptoms: string
    age: int
    heart_rate: int
    blood_pressure: int

action_space:
  type: dict
  fields:
    priority: int
    department: string

tasks:
  - name: easy
    difficulty: easy
    description: Predict correct department

  - name: medium
    difficulty: medium
    description: Predict correct department and priority

  - name: hard
    difficulty: hard
    description: Full triage with penalties for incorrect urgency

reward:
  type: dense
  description: >
    +0.5 for correct priority,
    +0.3 for correct department,
    -0.5 if a critical patient is assigned low priority